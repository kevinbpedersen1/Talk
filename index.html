<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#F8F6F2;--card:#fff;--text:#1C1C1A;--cue:#C0B8AF;--accent:#C4634A;--muted:#A09D96;--border:#EAE7E2;--transit:#9A9490;--pivot:#2A3B55;--green:#4A8C6F}
html{-webkit-tap-highlight-color:transparent;overflow-x:hidden}
body{background:var(--bg);font-family:'DM Sans',sans-serif;min-height:100vh;min-height:100dvh;overscroll-behavior:none}
#progressBar{position:fixed;top:0;left:0;height:3px;background:var(--accent);transition:width .3s ease;z-index:200;border-radius:0 2px 2px 0}
.header{position:fixed;top:0;left:0;right:0;height:50px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 1.1rem;z-index:100}
.header-title{font-size:.64rem;font-weight:500;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.header-right{display:flex;align-items:center;gap:.8rem}
.slide-counter{font-size:.76rem;color:var(--muted);font-variant-numeric:tabular-nums}
.print-btn{font-size:.66rem;font-weight:500;color:var(--accent);background:none;border:1px solid var(--accent);border-radius:6px;padding:.26rem .6rem;cursor:pointer;font-family:'DM Sans',sans-serif;-webkit-tap-highlight-color:transparent}
.print-btn:active{background:var(--accent);color:#fff}
.timer-bar{position:fixed;top:50px;left:0;right:0;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:.45rem 1.1rem;z-index:99;gap:.5rem}
.timer-left{display:flex;align-items:center;gap:.55rem}
.timer-btn{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--border);background:var(--card);display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent;flex-shrink:0}
.timer-btn:active{background:var(--bg)}
.timer-btn svg{width:14px;height:14px;fill:var(--text)}
.timer-btn.active{border-color:var(--accent);background:rgba(196,99,74,.06)}
.timer-btn.active svg{fill:var(--accent)}
.timer-slide{display:flex;flex-direction:column;align-items:flex-start;gap:.06rem;min-width:0}
.timer-slide-label{font-size:.56rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;white-space:nowrap}
.timer-slide-val{font-size:.9rem;font-weight:600;color:var(--text);font-variant-numeric:tabular-nums}
.timer-slide-val.over{color:var(--accent)}
.timer-slide-val.under{color:var(--green)}
.timer-total{display:flex;flex-direction:column;align-items:flex-end;gap:.06rem}
.timer-total-label{font-size:.56rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.timer-total-val{font-size:.9rem;font-weight:600;color:var(--text);font-variant-numeric:tabular-nums}
.main{margin-top:96px;padding:1rem .85rem 6rem;display:flex;flex-direction:column;align-items:center}
@media(min-width:640px){.main{padding:1.25rem 1rem 5.5rem}}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.1rem;width:100%;max-width:620px;box-shadow:0 2px 20px rgba(0,0,0,.045)}
.card.pivot-card{background:#F0F3F8;border-color:var(--pivot)}
@media(min-width:640px){.card{padding:1.3rem 1.4rem}}
.card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:.6rem;margin-bottom:.9rem;padding-bottom:.7rem;border-bottom:1px solid var(--border)}
.slide-num{font-size:.6rem;font-weight:600;color:var(--accent);letter-spacing:.12em;text-transform:uppercase;margin-bottom:.18rem}
.slide-num.blue{color:var(--pivot)}
.slide-title{font-size:.84rem;font-weight:600;color:var(--text);line-height:1.35}
.timing-badge{font-size:.74rem;font-weight:600;color:var(--accent);background:rgba(196,99,74,.08);padding:.24rem .55rem;border-radius:6px;white-space:nowrap;flex-shrink:0}
.timing-badge.blue{color:var(--pivot);background:rgba(42,59,85,.09)}
.blocks{display:flex;flex-direction:column;gap:.1rem}
.block-cue{font-size:.64rem;color:var(--cue);font-style:italic;padding:.22rem .6rem;border-left:2px solid var(--border);line-height:1.45;margin:.1rem 0}
.block-speak{font-family:'Lora',Georgia,serif;font-size:.88rem;line-height:1.65;color:var(--text);padding:.03rem 0}
.block-pause{font-size:.6rem;color:var(--cue);font-style:italic;text-align:center;padding:.08rem 0;letter-spacing:.04em}
.block-transit{font-size:.64rem;color:var(--transit);font-style:italic;margin-top:.8rem;padding-top:.75rem;border-top:1px solid var(--border);line-height:1.45}
.block-click{font-size:.6rem;font-weight:700;color:var(--accent);letter-spacing:.1em;text-transform:uppercase;margin-top:.2rem}
.block-pivot{font-family:'Lora',Georgia,serif;font-size:.92rem;line-height:1.55;color:var(--pivot);font-weight:600;padding:.05rem 0}
.block-press-b{font-size:.72rem;font-weight:700;color:#fff;background:var(--pivot);padding:.34rem .8rem;border-radius:6px;display:inline-block;margin:.25rem 0;letter-spacing:.05em}
.block-audience{font-size:.64rem;color:var(--accent);font-style:italic;padding:.22rem .6rem;border-left:2px solid var(--accent);line-height:1.45;margin:.1rem 0;background:rgba(196,99,74,.04);border-radius:0 5px 5px 0}
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:.55rem 1rem;padding-bottom:calc(.55rem + env(safe-area-inset-bottom,0px));z-index:100}
.nav-btn{font-size:.82rem;font-weight:500;color:var(--muted);background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.55rem 1.3rem;cursor:pointer;font-family:'DM Sans',sans-serif;-webkit-tap-highlight-color:transparent;min-width:82px;text-align:center;touch-action:manipulation}
.nav-btn:active:not(:disabled){color:var(--text);border-color:var(--muted);background:var(--bg)}
.nav-btn:disabled{opacity:.2;cursor:default}
.nav-hint{font-size:.58rem;color:var(--cue);letter-spacing:.05em}
@media print{
@page{size:A4;margin:1.2cm}
.header,.timer-bar,#progressBar,.nav,#slideCard{display:none!important}
body{background:white}
.main{margin-top:0;padding:0;display:block}
#printAll{display:grid!important;grid-template-columns:1fr 1fr;gap:.4cm}
}
#printAll{display:none}
.print-doc-title{font-size:7.5pt;font-weight:700;color:#888;letter-spacing:.1em;text-transform:uppercase;margin-bottom:.4cm;grid-column:1/-1}
.print-card{border:1px solid #D8D4CE;border-radius:4px;padding:.32cm .38cm;page-break-inside:avoid;background:white}
.print-card.pivot{border-color:#2A3B55;background:#EEF1F6}
.pcard-header{display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid #E0DDD8;padding-bottom:.15cm;margin-bottom:.18cm}
.pcard-num{font-size:6pt;font-weight:700;color:#C4634A;text-transform:uppercase;letter-spacing:.08em;line-height:1.3}
.pcard-num.blue{color:#2A3B55}
.pcard-title{font-size:7pt;font-weight:700;color:#1C1C1A;line-height:1.3}
.pcard-timing{font-size:6.5pt;font-weight:700;color:#C4634A}
.pcard-timing.blue{color:#2A3B55}
.pcard-bullets{list-style:none;padding:0}
.pcard-bullets li{font-size:6.8pt;line-height:1.5;color:#1C1C1A;display:flex;gap:.12cm;padding:.025cm 0}
.pcard-bullets li::before{content:"\00B7";color:#C4634A;font-weight:700;flex-shrink:0}
.pcard-bullets li.blue::before{color:#2A3B55}
.pcard-cue{color:#B8B0A7;font-style:italic}
</style>
</head>

<div id="progressBar"></div>
<header class="header">

<script>
var S=[
{num:"01",title:"TITLE",timing:"1:40",pivot:false,
blocks:[
{t:"cue",v:"Walk centre \u00b7 Settle \u00b7 Plant feet \u00b7 Eye contact \u00b7 Warm \u00b7 Take it in for a second"},
{t:"speak",v:"Thank you for having me."},
{t:"pause",v:"\u2014 pause \u00b7 genuine \u00b7 look out at the room \u2014"},
{t:"cue",v:"Take a brief moment \u2014 you\u2019re a PhD researcher on a big stage. Let that land."},
{t:"speak",v:"I was talking to a friend recently."},
{t:"speak",v:"You know the type."},
{t:"pause",v:"\u2014 beat \u2014"},
{t:"speak",v:"Follows every health account on Instagram. Listens to all the podcasts."},
{t:"pause",v:"\u2014 pause \u2014"},
{t:"speak",v:"And he took me through this whole thing \u2014 how to prepare your meals, how to structure your training, when to eat, what to eat."},
{t:"speak",v:"A whole science."},
{t:"pause",v:"\u2014 pause \u2014"},
{t:"speak",v:"And then we got to sleep."},
{t:"speak",v:"And he just said \u2014 sleep seven to nine hours."},
{t:"pause",v:"\u2014 pause \u00b7 let it land \u2014"},
{t:"speak",v:"That was it."},
{t:"pause",v:"\u2014 beat \u2014"},
{t:"speak",v:"You just walked me through the biochemistry of a salad \u2014 but sleep is just... a number?"},
{t:"pause",v:"\u2014 pause \u2014"},
{t:"speak",v:"Is it that simple \u2014 that we can say good sleep and poor sleep are just one label?"},
{t:"transit",v:"\u2192 Slide 2 \u2014 turn question to the room"}
],
bullets:[
{s:"Thank you for having me.",c:"(pause \u00b7 take it in)"},
{s:"Talking to a friend. You know the type.",c:"(beat)"},
{s:"Every health account \u00b7 all the podcasts.",c:"(pause)"},
{s:"Meals \u00b7 training \u00b7 when to eat. A whole science.",c:"(pause)"},
{s:"Then sleep: just 7\u20139 hours.",c:"(let it land)"},
{s:"That was it.",c:"(beat)"},
{s:"Biochemistry of a salad \u2014 but sleep is just a number?",c:"(pause)"},
{s:"Can we say good/poor sleep with one label?"}
]},

{num:“02”,title:“WHO HAS THE SLEEP PROBLEM?”,timing:“0:45”,pivot:false,
blocks:[
{t:“cue”,v:“Turn question directly to the room \u00b7 Hold the silence \u00b7 Don\u2019t answer it”},
{t:“speak”,v:“So \u2014 if that\u2019s the definition \u2014 then who here has a sleep problem?”},
{t:“cue”,v:“Raise your own hand \u00b7 Hold it \u00b7 Let them sit with it”},
{t:“pause”,v:”\u2014 pause \u00b7 let them sit with it \u2014”},
{t:“speak”,v:“So maybe we shouldn\u2019t start with who has a sleep problem.”},
{t:“speak”,v:“But maybe \u2014 what IS a sleep problem?”},
{t:“pause”,v:”\u2014 pause 3 sec \u00b7 don\u2019t answer it \u2014”},
{t:“speak”,v:“We often talk about sleep the way we talk about colours.”},
{t:“speak”,v:“As one thing. One word.”},
{t:“pause”,v:”\u2014 pause \u2014”},
{t:“transit”,v:”\u2192 Click to green slide”}
],
bullets:[
{s:“If that\u2019s the definition \u2014 who here has a sleep problem?”,c:”(raise hand \u00b7 let it sit)”},
{s:“Maybe not who has a sleep problem \u2014 but what IS a sleep problem?”,c:”(pause 3s \u00b7 don\u2019t answer)”},
{s:“We often talk about sleep the way we talk about colours.”,c:”(pause \u00b7 \u2192 green slide)”},
{s:“As one thing. One word.”}
]},

{num:“03”,title:“GREEN \u2014 TEXT FIRST”,timing:“0:50”,pivot:false,
blocks:[
{t:“cue”,v:”\u2018GREEN\u2019 text is on screen \u00b7 Audience interaction \u00b7 Warm \u00b7 Don\u2019t rush”},
{t:“speak”,v:“If I asked you \u2014 do you know what green is?”},
{t:“speak”,v:“You\u2019d probably say yes.”},
{t:“audience”,v:”\u2192 Look towards the back of the room”},
{t:“speak”,v:“If I asked someone all the way in the back \u2014 they\u2019d say yes too.”},
{t:“pause”,v:”\u2014 pause \u2014”},
{t:“speak”,v:“But is your green the same green?”},
{t:“pause”,v:”\u2014 beat \u2014”},
{t:“speak”,v:“Is green just\u2026 one colour?”},
{t:“click”,v:“CLICK \u2014 colour palette reveals”},
{t:“speak”,v:“What about lime?”},
{t:“speak”,v:“What about forest? What about olive?”},
{t:“pause”,v:”\u2014 pause \u2014”},
{t:“speak”,v:“See, green is not just one colour. And the green you think of might not be the same as the person next to you.”},
{t:“pause”,v:”\u2014 pause \u2014”},
{t:“speak”,v:“And maybe the same goes for sleep.”},
{t:“transit”,v:”\u2192 Let\u2019s start with how common it is.”}
],
bullets:[
{s:“Do you know what green is? \u2014 yes.”,c:”(look at room)”},
{s:“Someone in the back \u2014 yes too.”,c:”(pause)”},
{s:“But is your green the same green?”,c:”(beat)”},
{s:“CLICK \u2192 palette reveals”,c:”(lime \u00b7 forest \u00b7 olive)”},
{s:“Green is not just one colour. Yours \u2260 theirs.”,c:”(pause)”},
{s:“Maybe the same goes for sleep.”}
]},

{num:“04”,title:“HOW COMMON?”,timing:“0:50”,pivot:false,
blocks:[
{t:“cue”,v:“Factual \u00b7 Let each number land \u00b7 Pause between each”},
{t:“speak”,v:“It depends on how you ask.”},
{t:“pause”,v:”\u2014 pause \u2014”},
{t:“speak”,v:“One question gives you one in six.”},
{t:“speak”,v:“Another gives you twenty to thirty percent.”},
{t:“speak”,v:“A third \u2014 nearly one in two.”},
{t:“pause”,v:”\u2014 pause \u2014”},
{t:“speak”,v:“That\u2019s not a data problem. That\u2019s a definition problem.”},
{t:“pause”,v:”\u2014 beat \u2014”},
{t:“speak”,v:“Because if we ask \u2018do you have a sleep problem?\u2019 \u2014”},
{t:“speak”,v:“The answer might depend on how we interpret what a sleep problem is.”},
{t:“speak”,v:“So instead of asking which number is right \u2014”},
{t:“speak”,v:“we decided to look at the person behind the answer.”},
{t:“transit”,v:”\u2192 So instead of picking one question \u2014 we used all three.”}
],
bullets:[
{s:“Depends how you ask.”,c:”(pause)”},
{s:“1 in 6 \u00b7 20\u201330% \u00b7 nearly 1 in 2”,c:”(pause)”},
{s:“Not a data problem \u2014 a definition problem.”,c:”(beat)”},
{s:“The answer depends on how we interpret it.”},
{s:“So we looked at the person behind the answer.”}
]},

{num:“05”,title:“COMBINING ANSWERS, PERSON BY PERSON”,timing:“0:55”,pivot:false,
blocks:[
{t:“cue”,v:“Clear, methodical \u00b7 Let the logic unfold \u00b7 Don\u2019t rush”},
{t:“speak”,v:“We had three questions from the Danish National Health Survey.”},
{t:“speak”,v:“How long you slept. Whether you felt rested.”},
{t:“speak”,v:“Whether you had any sleep complaints \u2014 trouble falling asleep, staying asleep, or waking unrested.”},
{t:“pause”,v:”\u2014 pause \u2014”},
{t:“speak”,v:“Many studies take one of these. And call it sleep.”},
{t:“speak”,v:“We thought: what if we look at all three at once?”},
{t:“speak”,v:“Not separately \u2014 but combined. Person by person.”},
{t:“pause”,v:”\u2014 pause \u2014”},
{t:“speak”,v:“Across 294,610 Danish adults. 2010 to 2021.”},
{t:“pause”,v:”\u2014 pause \u2014”},
{t:“speak”,v:“So we used a method called Latent Class Analysis \u2014”},
{t:“speak”,v:“and asked one question.”},
{t:“pause”,v:”\u2014 beat \u2014”},
{t:“speak”,v:“Do people\u2019s sleep answers group into patterns?”},
{t:“pause”,v:”\u2014 pause \u2014”},
{t:“transit”,v:”\u2192 What came back was four.”}
],
bullets:[
{s:“3 questions \u00b7 Danish National Health Survey:”},
{s:“duration \u00b7 rested \u00b7 sleep complaints”},
{s:“Many studies: one at a time. We: all three.”,c:”(pause)”},
{s:“294,610 adults \u00b7 2010\u20132021”,c:”(pause)”},
{s:“Used Latent Class Analysis \u2014 one question:”,c:”(beat)”},
{s:“Do people\u2019s sleep answers group into patterns?”,c:”(pause)”}
]},

{num:“06”,title:“FOUR PROFILES”,timing:“1:20”,pivot:false,
blocks:[
{t:“cue”,v:“Point to each profile \u00b7 Slow down on P3 \u00b7 Hold after \u2018Not recovering\u2019”},
{t:“speak”,v:“What came back was four profiles.”},
{t:“pause”,v:”\u2014 pause 1 sec \u2014”},
{t:“speak”,v:“Profile one. Fifty-five percent.”},
{t:“speak”,v:“Sleeps enough. Feels rested. Few complaints. The majority.”},
{t:“speak”,v:“Profile two. Two percent.”},
{t:“speak”,v:“Sleeps little \u2014 but feels fine.”},
{t:“pause”,v:”\u2014 beat \u2014”},
{t:“speak”,v:“Short sleep without the usual baggage.”},
{t:“speak”,v:“Profile three. Thirty-five percent.”},
{t:“speak”,v:“Sleeps enough. But doesn\u2019t feel rested. Mixed complaints.”},
{t:“pause”,v:”\u2014 pause \u00b7 hold it \u2014”},
{t:“speak”,v:“One in three Danes. Sleeping \u2018enough\u2019 \u2014 on paper. Not recovering.”},
{t:“speak”,v:“Profile four. Eight percent.”},
{t:“speak”,v:“Short or long. Non-restorative. Multiple complaints. The high-burden group.”},
{t:“pause”,v:”\u2014 pause \u2014”},
{t:“speak”,v:“Four groups. Four different realities behind one label.”},
{t:“transit”,v:”\u2192 Are these just patterns? Or different people?”}
],
bullets:[
{s:“Four profiles.”,c:”(pause 1s)”},
{s:“P1 \u2014 55%: sleeps enough \u00b7 feels rested”},
{s:“P2 \u2014 2%: sleeps little \u00b7 but fine”,c:”(beat)”},
{s:“P3 \u2014 35%: sleeps enough \u00b7 NOT rested”,c:”(pause \u00b7 hold)”},
{s:“1 in 3 Danes. Enough on paper. Not recovering.”},
{s:“P4 \u2014 8%: non-restorative \u00b7 most burdened”,c:”(pause)”},
{s:“Four realities behind one label.”}
]},

{num:“07”,title:“WHO IS IN EACH GROUP”,timing:“0:55”,pivot:false,
blocks:[
{t:“cue”,v:“Narrow focus \u00b7 Simplify to the two ends”},
{t:“speak”,v:“Are these just patterns in the numbers? Or are they actually different people?”},
{t:“speak”,v:“They\u2019re different people.”},
{t:“speak”,v:“Good sleepers \u2014 Profile 1 \u2014 skew older. More often employed. More often partnered.”},
{t:“speak”,v:“High burden \u2014 Profile 4 \u2014 skew the other way.”},
{t:“speak”,v:“Younger. More often out of work. Less often partnered.”},
{t:“speak”,v:“Short sleepers and non-restorative sit between \u2014 each with their own signature.”},
{t:“pause”,v:”\u2014 pause \u2014”},
{t:“speak”,v:“These are averages. Every profile contains every kind of person.”},
{t:“transit”,v:”\u2192 Then we looked at health.”}
],
bullets:[
{s:“Patterns in numbers \u2014 or different people?”},
{s:“P1: older \u00b7 employed \u00b7 partnered”},
{s:“P4: younger \u00b7 out of work \u00b7 less often partnered”},
{s:“P2 & P3 sit between \u2014 own signature.”,c:”(pause)”},
{s:“These are averages. Every kind of person.”}
]},

{num:“8a”,title:“THE HEALTH GAP”,timing:“0:40”,pivot:false,
blocks:[
{t:“cue”,v:“Data punch \u00b7 Stay on P1 vs P4 \u00b7 Drop volume on \u2018Eleven times\u2019”},
{t:“speak”,v:“Profile 1 versus Profile 4.”},
{t:“speak”,v:“Poor self-rated health. Eleven times more likely in Profile 4.”},
{t:“pause”,v:”\u2014 pause \u00b7 DROP VOLUME \u2014”},
{t:“speak”,v:“Eleven times.”},
{t:“speak”,v:“Psychiatric diagnosis. Five percent in Profile 1. Twenty percent in Profile 4. Four times more.”},
{t:“pause”,v:”\u2014 pause \u2014”},
{t:“speak”,v:“And that\u2019s just how they feel, and what\u2019s on their record.”},
{t:“speak”,v:“Let me show you what they actually take.”},
{t:“click”,v:“CLICK \u2192”}
],

var cur=0;
function render(){
var sl=S[cur],total=S.length;
document.getElementById(‘progressBar’).style.width=((cur+1)/total*100)+’%’;

var card=document.getElementById(‘slideCard’);
card.className=sl.pivot?‘card pivot-card’:‘card’;
var html=’<div class="card-header"><div><div class="slide-num'+(sl.pivot?' blue':'')+'">’+(sl.pivot?’’:‘Slide ‘)+sl.num+’</div><div class="slide-title">’+sl.title+’</div></div><div class="timing-badge'+(sl.pivot?' blue':'')+'">’+sl.timing+’</div></div><div class="blocks">’;
sl.blocks.forEach(function(b){
if(b.t===‘speak’)html+=’<div class="block-speak">’+b.v+’</div>’;
else if(b.t===‘cue’)html+=’<div class="block-cue">’+b.v+’</div>’;
else if(b.t===‘pause’)html+=’<div class="block-pause">’+b.v+’</div>’;
else if(b.t===‘transit’)html+=’<div class="block-transit">’+b.v+’</div>’;
else if(b.t===‘click’)html+=’<div class="block-click">’+b.v+’</div>’;
else if(b.t===‘pivot’)html+=’<div class="block-pivot">’+b.v+’</div>’;
else if(b.t===‘press-b’)html+=’<span class="block-press-b">’+b.v+’</span>’;
else if(b.t===‘audience’)html+=’<div class="block-audience">’+b.v+’</div>’;
});
html+=’</div>’;
card.innerHTML=html;
slideElapsed=0;updateTimerTarget();updateTimerDisplay();
}
function go(dir){var n=cur+dir;if(n>=0&&n<S.length){cur=n;render();window.scrollTo({top:0,behavior:‘instant’});}}
document.addEventListener(‘keydown’,function(e){if(e.key===‘ArrowRight’||e.key===‘ArrowDown’)go(1);if(e.key===‘ArrowLeft’||e.key===‘ArrowUp’)go(-1);});
var touchStartX=0,touchStartY=0,touchStartTime=0;
document.addEventListener(‘touchstart’,function(e){touchStartX=e.changedTouches[0].clientX;touchStartY=e.changedTouches[0].clientY;touchStartTime=Date.now();},{passive:true});
document.addEventListener(‘touchend’,function(e){var dx=e.changedTouches[0].clientX-touchStartX;var dy=e.changedTouches[0].clientY-touchStartY;var dt=Date.now()-touchStartTime;if(dt>400||Math.abs(dx)<50||Math.abs(dy)>Math.abs(dx)*0.6)return;if(dx<0)go(1);else go(-1);},{passive:true});
var timerRunning=false,timerInterval=null,slideElapsed=0,totalElapsed=0;
function parseTiming(t){if(!t||t===’\u2014’||t===’\u2014’)return null;var p=t.split(’:’);return parseInt(p[0])*60+parseInt(p[1]);}
function fmtTime(sec){var m=Math.floor(sec/60);var s=sec%60;return m+’:’+String(s).padStart(2,‘0’);}
function updateTimerTarget(){var target=parseTiming(S[cur].timing);document.getElementById(‘timerTarget’).textContent=target!==null?’\u00b7 target ‘+S[cur].timing:’’;}
function updateTimerDisplay(){var target=parseTiming(S[cur].timing);var el=document.getElementById(‘timerSlideVal’);el.textContent=fmtTime(slideElapsed);if(target!==null){el.className=slideElapsed>target?‘timer-slide-val over’:‘timer-slide-val under’;}else{el.className=‘timer-slide-val’;}document.getElementById(‘timerTotalVal’).textContent=fmtTime(totalElapsed);}
function toggleTimer(){if(timerRunning){clearInterval(timerInterval);timerRunning=false;document.getElementById(‘timerPlayBtn’).classList.remove(‘active’);document.getElementById(‘playIcon’).style.display=’’;document.getElementById(‘pauseIcon’).style.display=‘none’;}else{timerRunning=true;document.getElementById(‘timerPlayBtn’).classList.add(‘active’);document.getElementById(‘playIcon’).style.display=‘none’;document.getElementById(‘pauseIcon’).style.display=’’;timerInterval=setInterval(function(){slideElapsed++;totalElapsed++;updateTimerDisplay();},1000);}}
function resetTimer(){clearInterval(timerInterval);timerRunning=false;slideElapsed=0;totalElapsed=0;document.getElementById(‘timerPlayBtn’).classList.remove(‘active’);document.getElementById(‘playIcon’).style.display=’’;document.getElementById(‘pauseIcon’).style.display=‘none’;updateTimerDisplay();}

html+=’</ul></div>’;
});
document.getElementById(‘printAll’).innerHTML=html;
}
